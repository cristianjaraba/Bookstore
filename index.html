<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore</title>

    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/book.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="books-wrapper">
        <div class="book">
            <h3>Die Geheimnisse des Ozeans</h3>
            <hr>
            <div class="img-wrapper">
                <div class="bg-img">
                </div>
                <img src="./assets/img/book_img.png" alt="Bild eines Buches">
            </div>
            <hr>
            <div class="book-content">
                <div class="book-price-likes">
                    <p>19,99€</p>
                    <div class="book-likes">
                        <p>1250</p>
                        <button onclick="toggleLikeAndLiked()" class="like-btn">
                            <svg id="heart-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                fill="floralwhite" class="bi bi-heart-fill" viewBox="0 0 16 16">
                                <path fill-rule="evenodd"
                                    d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314" />
                            </svg>
                        </button>
                    </div>
                </div>
                <table>
                    <tr>
                        <th>Author</th>
                        <td>: Clara Meer</td>
                    </tr>
                    <tr>
                        <th>Erscheinungsjahr</th>
                        <td>: 2018</td>
                    </tr>
                    <tr>
                        <th>Genre</th>
                        <td>: Fantasy</td>
                    </tr>
                </table>
            </div>
            <hr>
            <div class="book-comments">
                <p>Kommentare:</p>
                <textarea disabled id="display-comments" cols="35" rows="6">

[Lorem ipsum]: Dolor sit amet consectetur, adipisicing elit.

                </textarea>
                <div class="input-container">
                    <input placeholder="Schreibe dein Kommentar..." type="text">
                    <button class="send-comment-btn">
                        <svg fill="#000000" width="800" height="800" viewBox="0 0 31.806 31.806"
                            xmlns="http://www.w3.org/2000/svg">
                            <g>
                                <path d="M1.286,12.465c-0.685,0.263-1.171,0.879-1.268,1.606c-0.096,0.728,0.213,1.449,0.806,1.88l6.492,4.724L30.374,2.534
                        L9.985,22.621l8.875,6.458c0.564,0.41,1.293,0.533,1.964,0.33c0.67-0.204,1.204-0.713,1.444-1.368l9.494-25.986
                        c0.096-0.264,0.028-0.559-0.172-0.756c-0.199-0.197-0.494-0.259-0.758-0.158L1.286,12.465z" />
                                <path d="M5.774,22.246l0.055,0.301l1.26,6.889c0.094,0.512,0.436,0.941,0.912,1.148c0.476,0.206,1.025,0.162,1.461-0.119
                        c1.755-1.132,4.047-2.634,3.985-2.722L5.774,22.246z" />
                            </g>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
